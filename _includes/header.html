{%- assign t = site.data.i18n[page.lang] -%}
<header class="site-header">
  <a class="wordmark" href="{{ t.home_url | relative_url }}">
    <picture>
      <source srcset="{{ '/assets/img/logo-dark.png' | relative_url }}" media="(prefers-color-scheme: dark)" />
      <img src="{{ '/assets/img/logo.png' | relative_url }}" alt="Fora Labs" width="1580" height="233" />
    </picture>
  </a>
  <nav class="nav" aria-label="{{ t.nav_aria }}">
    <a href="{{ t.products_url | relative_url }}"{% if page.nav_section == 'products' %} aria-current="page"{% endif %}>{{ t.products_label }}</a>
    <a href="{{ t.plugins_url | relative_url }}"{% if page.nav_section == 'plugins' %} aria-current="page"{% endif %}>{{ t.plugins_label }}</a>
  </nav>
  <nav class="lang-switcher" aria-label="{{ t.lang_aria }}">
    <a href="{{ en_url | relative_url }}"{% if page.lang == 'en' %} aria-current="page"{% endif %}>EN</a>
    <a href="{{ tr_url | relative_url }}"{% if page.lang == 'tr' %} aria-current="page"{% endif %}>TR</a>
  </nav>
</header>
