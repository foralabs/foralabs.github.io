          SAML SP özel anahtarları ve OIDC istemci sırları, ActiveRecord
          Encryption (AES-256-GCM) ile bekleme durumunda şifrelenir. Redmine'ınız
          zaten kendi ActiveRecord Encryption anahtarlığını çalıştırıyorsa Adit
          onu kullanır. Aksi hâlde, sağlayıcı sırlarını kaydetmeden önce üç ortam
          değişkenini ayarlayın — ADIT_AR_ENCRYPTION_PRIMARY_KEY,
          ADIT_AR_ENCRYPTION_DETERMINISTIC_KEY ve
          ADIT_AR_ENCRYPTION_KEY_DERIVATION_SALT. Adit güvenli tarafta kalır:
          anahtarlar yoksa sırları düz metin olarak saklamaz; Redmine çalışmaya
          devam ederken yönetim ekranı eksik yapılandırmayı bildirir.
      - q: Redmine'ı yalnızca SSO ile sınırlayabilir veya girişleri IP'ye göre kısıtlayabilir miyim?
        a: >-
          Evet. Erişim politikaları; yalnızca SSO ile girişi zorunlu kılabilir
          (isteğe bağlı olarak parola formunu gizleyerek), yerel parola ile
          girişi devre dışı bırakabilir ve etkileşimli girişlere IP izin ve ret
          listeleri uygulayabilir; SCIM uç noktası için ayrı bir izin listesi
          bulunur. Boşta kalma ve mutlak oturum zaman aşımları da yapılandırılabilir.
      - q: SSO yanlış yapılandırılırsa ve kimse giriş yapamazsa ne olur?
        a: >-
          Adit bir acil durum kaçış yolu içerir: bir yönetici, tek kullanımlık ve
          süreli bir kurtarma jetonu (varsayılan olarak bir saat geçerli)
          oluşturabilir; bu jeton, yalnızca SSO modu veya devre dışı bırakılmış
          parola girişi erişimi engelleyecek olsa bile yerel girişe izin verir.
          Jeton yalnızca bir özet (hash) olarak saklanır ve otomatik olarak
          süresi dolar.
      - q: Yıllık lisansa neler dahil?
        a: Her lisansa tüm Adit özellikleri, ürün güncellemeleri, planınıza ait destek seviyesi, bir production kurulumu ve en az bir staging veya test kurulumu dahildir.
      - q: Staging kullanımı dahil mi?
        a: Evet. Her lisansa, production kurulumunuzun yanında bir staging veya test kurulumu dahildir.
      - q: Aktif kullanıcı sınırı nasıl hesaplanıyor?
        a: Plan seviyeleri, Redmine kurulumunuzdaki aktif kullanıcı hesabı sayısına göre belirlenir.
      - q: Kurulum desteği dahil mi?
        a: Kurulum dokümantasyonu her lisansa dahildir. Uygulamalı uzaktan kurulum ücretli bir ek hizmet olarak sunulur; Business ve Enterprise planları bir uzaktan kurulum veya başlangıç görüşmesi içerir.
      - q: Birden fazla Redmine kurulumunu lisanslayabilir miyim?
        a: Evet. Ek production kurulumları ana lisans fiyatının %60'ı üzerinden sunulur; Enterprise Plus ise birden fazla production kurulumunu kapsar.

  final:
    heading: Redmine'ınıza kurumsal kimlik ve erişim yönetimi getirin
    body: Demo talep edin, lisanslamayı sorun veya kimlik altyapınızı birlikte konuşalım.
