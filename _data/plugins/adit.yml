# Adit sales-page copy — single source of truth for both locales.
# Consumed by _layouts/plugin.html (via project_id). Keep claims here verifiable:
# Adit is a SCIM 2.0 *server*: identity providers (the SCIM clients) push to it
# to create, update and deactivate Redmine users and groups, and to sync group
# membership. Provisioning / sync / write-support language IS accurate — the
# server implements create/replace/PATCH/deactivate (deactivation locks the
# account, never hard-deletes). Adit is NOT a SCIM *client* (it never pulls a
# directory from the provider). Microsoft Entra ID and Okta are verified-
# compatible SCIM 2.0 clients and may be named as examples. Do not add version
# numbers, ratings, or customer counts that are not confirmed by the product.

en:
  category: Adit — Redmine Identity & Access Management Plugin
  cta_demo: Request a demo
  cta_contact: Contact us

  hero:
    heading: Enterprise identity and access management for Redmine
    description: >-
      Add SAML, OIDC, enforced 2FA, access policies, automated SCIM 2.0 user
      provisioning and audit logging to Redmine 5 and 6. Configure everything
      from the Redmine administration interface without editing configuration
      files or restarting the server.

  summary:
    label: Overview
    body: >-
      Adit is a commercial plugin that brings enterprise identity and access
      controls to a Redmine you already run. Single sign-on, mandatory
      two-factor authentication, automated user provisioning from your identity
      provider, centrally managed access policies and a complete audit trail —
      all managed from the Redmine administration interface, with no
      configuration-file edits and no server restarts.

  features:
    label: Key features
    items:
      - title: SAML SSO
        desc: Connect Redmine to your existing enterprise identity provider using SAML 2.0.
      - title: OpenID Connect
        desc: Authenticate Redmine users through standards-based OpenID Connect providers.
      - title: Enforced 2FA
        desc: Require two-factor authentication globally or for specific groups or roles, layered on Redmine's built-in 2FA. Optionally accept IdP-asserted MFA as satisfying the requirement for that session.
      - title: Optional auto-registration
        desc: Optionally auto-register external users in Redmine the first time they sign in through SSO, gated by a login check page and your access policies.
      - title: Access policies
        desc: Enforce SSO-only login, IP allow and deny lists, and idle and absolute session timeouts — all managed centrally from the Redmine administration interface.
      - title: Automated SCIM 2.0 provisioning
        desc: Let identity providers such as Microsoft Entra ID and Okta create, update and deactivate Redmine users and keep group memberships in sync over a standards-compliant SCIM 2.0 API.
      - title: Audit logging
        desc: Record every identity, authentication and administration event in an append-only log with a filterable viewer, CSV export and configurable retention.
      - title: Emergency access
        desc: Issue a one-time, time-limited recovery token to sign in locally if SSO is ever misconfigured or password login is disabled — so administrators are never locked out.
      - title: Administration interface
        desc: Configure identity providers and security policies directly from Redmine without editing deployment configuration.

  screenshots:
    label: See Adit in action
    items:
      - img: login-sso.png
        caption: Single sign-on login
      - img: identity-providers.png
        caption: Identity providers
      - img: saml-provider.png
        caption: SAML provider configuration
      - img: oidc-provider.png
        caption: OpenID Connect provider configuration
      - img: access-policy.png
        caption: Access policy
      - img: 2fa-policy.png
        caption: 2FA policy
      - img: scim-server.png
        caption: SCIM 2.0 server
      - img: audit-log.png
        caption: Audit log

  scim:
    label: SCIM
    heading: Provision Redmine users and groups from your identity provider
    body: >-
      Adit includes a native SCIM 2.0 server — the standard endpoint identity
      providers like Microsoft Entra ID and Okta push to. Your provider
      automatically creates, updates and deactivates Redmine users and keeps
      group memberships in sync, so joiners, movers and leavers are handled
      centrally. Deactivation locks the Redmine account rather than deleting it,
      and every SCIM operation is written to the audit log. Adit is the SCIM
      server, not a client — your provider connects to it; Adit never reaches
      out to pull a directory.

  compat:
    label: Compatibility
    heading: Works with your identity infrastructure
    body: >-
      Compatible with standards-compliant SAML 2.0 and OpenID Connect identity
      providers.
    versions_label: Supported Redmine
    versions:
      - Redmine 5
      - Redmine 6

  security:
    label: Security & audit
    heading: Built for security reviews
    body: >-
      Help your Redmine deployment address common identity, access-control and
      audit requirements during security reviews. Every identity,
      authentication and administration event is recorded in an append-only log
      you can filter, export to CSV and retain for a configurable period, so you
      can demonstrate who did what, and when. Provider secrets — SAML private
      keys and OIDC client secrets — are encrypted at rest.

  pricing:
    label: Pricing
    heading: Simple, per-instance licensing
    intro: >-
      Adit is licensed annually, per production Redmine instance. Every licence
      includes a staging or test installation, and every plan includes every
      Adit feature — SAML, OIDC, 2FA, SCIM, access policies and audit logging
