  faq:
    label: Frequently asked questions
    items:
      - q: Which Redmine versions are supported?
        a: Adit supports Redmine 5 and Redmine 6.
      - q: Does Adit require changes to configuration files?
        a: No. Adit is configured entirely from the Redmine administration interface. You do not need to edit deployment configuration files.
      - q: Do configuration changes require a server restart?
        a: No. Settings take effect from the administration interface without restarting the server.
      - q: Is Adit a SCIM client or a SCIM server?
        a: Adit operates as a SCIM 2.0 server. Your identity provider (the SCIM client) connects to it and provisions users and groups into Redmine. Adit does not reach out to pull a directory from the provider — the provider pushes changes to Adit.
      - q: Can Adit provision users from Entra ID or Okta into Redmine over SCIM?
        a: Yes. Adit's SCIM 2.0 server lets identity providers such as Microsoft Entra ID and Okta automatically create, update and deactivate Redmine users and keep group memberships in sync. Deactivating a user locks the Redmine account rather than deleting it, and every SCIM operation is recorded in the audit log.
      - q: Which identity providers are supported?
        a: Adit works with standards-compliant SAML 2.0 and OpenID Connect identity providers.
      - q: Is Adit suitable for self-hosted Redmine?
        a: Yes. Adit is designed for self-hosted Redmine 5 and 6 installations.
      - q: How does Adit store SAML and OIDC secrets?
        a: >-
          SAML SP private keys and OIDC client secrets are encrypted at rest
          using ActiveRecord Encryption (AES-256-GCM). If your Redmine already
          runs its own ActiveRecord Encryption keyring, Adit uses it. Otherwise,
          set three environment variables before saving provider secrets —
          ADIT_AR_ENCRYPTION_PRIMARY_KEY, ADIT_AR_ENCRYPTION_DETERMINISTIC_KEY
          and ADIT_AR_ENCRYPTION_KEY_DERIVATION_SALT. Adit fails closed: if the
          keys are absent it will not store secrets in plaintext, and Redmine
          keeps running while the admin screen flags the missing configuration.
      - q: Can I restrict Redmine to SSO only, or limit logins by IP?
        a: >-
          Yes. Access policies can enforce SSO-only login (optionally hiding the
          password form), disable native password login, and apply IP allow and
          deny lists to interactive logins, with a separate allow list for the
          SCIM endpoint. Idle and absolute session timeouts are configurable as
          well.
      - q: What happens if SSO is misconfigured and no one can log in?
        a: >-
          Adit includes an emergency escape hatch: an administrator can issue a
          one-time, time-limited recovery token (valid for one hour by default)
          that allows a local sign-in even when SSO-only mode or disabled
          password login would otherwise block access. The token is stored only
          as a hash and expires automatically.
      - q: What is included in the annual licence?
        a: Every licence includes all Adit features, product updates, the support tier for your plan, one production instance and at least one staging or test installation.
      - q: Is staging usage included?
        a: Yes. Each licence includes a staging or test installation alongside your production instance.
      - q: How is the active user limit calculated?
        a: The plan tiers are based on the number of active user accounts in your Redmine instance.
      - q: Is installation support included?
        a: Installation documentation is included with every licence. Hands-on remote installation is available as a paid add-on, and Business and Enterprise plans include a remote installation or onboarding call.
      - q: Can I license multiple Redmine instances?
        a: Yes. Additional production instances are available at 60% of the main licence price, and Enterprise Plus covers multiple production installations.

  final:
    heading: Bring enterprise identity and access management to your Redmine
    body: Request a demo, ask about licensing, or talk through your identity setup.

