    label: Sıkça sorulan sorular
    items:
      - q: Hangi Redmine sürümleri destekleniyor?
        a: Adit, Redmine 5 ve Redmine 6'yı destekler.
      - q: Adit yapılandırma dosyalarında değişiklik gerektiriyor mu?
        a: Hayır. Adit tamamen Redmine yönetim panelinden yapılandırılır. Deployment yapılandırma dosyalarını düzenlemeniz gerekmez.
      - q: Yapılandırma değişiklikleri sunucunun yeniden başlatılmasını gerektiriyor mu?
        a: Hayır. Ayarlar, sunucu yeniden başlatılmadan yönetim panelinden geçerli olur.
      - q: Adit bir SCIM istemcisi mi yoksa SCIM sunucusu mu?
        a: Adit, Redmine kullanıcı dizini için bir SCIM 2.0 sunucusu olarak çalışır. Bir kimlik sağlayıcıdan Redmine'a kullanıcı aktaran bir SCIM istemcisi olarak çalışmaz.
      - q: Adit, Entra ID veya Okta'dan Redmine'a SCIM üzerinden kullanıcı aktarabilir mi?
        a: Hayır. Adit'in SCIM 2.0 desteği, mevcut Redmine kullanıcı dizinini erişime açan bir sunucudur — bir kimlik sağlayıcıdan kullanıcı dizini içe aktaran veya eşitleyen bir SCIM istemcisi olarak çalışmaz.
      - q: Hangi kimlik sağlayıcıları destekleniyor?
        a: Adit, standartlara uyumlu SAML 2.0 ve OpenID Connect kimlik sağlayıcılarıyla çalışır.
      - q: Adit, kendi sunucusunda barındırılan (self-hosted) Redmine için uygun mu?
        a: Evet. Adit, kendi sunucunuzda barındırdığınız Redmine 5 ve 6 kurulumları için tasarlanmıştır.
      - q: Yıllık lisansa neler dahil?
        a: Her lisansa tüm Adit özellikleri, ürün güncellemeleri, planınıza ait destek seviyesi, bir production kurulumu ve en az bir staging veya test kurulumu dahildir.
      - q: Staging kullanımı dahil mi?
        a: Evet. Her lisansa, production kurulumunuzun yanında bir staging veya test kurulumu dahildir.
      - q: Aktif kullanıcı sınırı nasıl hesaplanıyor?
        a: Plan seviyeleri, Redmine kurulumunuzdaki aktif kullanıcı hesabı sayısına göre belirlenir.
      - q: Kurulum desteği dahil mi?
        a: Kurulum dokümantasyonu her lisansa dahildir. Uygulamalı uzaktan kurulum ücretli bir ek hizmet olarak sunulur; Business ve Enterprise planları bir uzaktan kurulum veya başlangıç görüşmesi içerir.
      - q: Birden fazla Redmine kurulumunu lisanslayabilir miyim?
        a: Evet. Ek production kurulumları ana lisans fiyatının %60'ı üzerinden sunulur; Enterprise Plus ise birden fazla production kurulumunu kapsar.

